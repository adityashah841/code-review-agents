name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run test suite
        run: uv run pytest tests/ -v --no-header --tb=short

      - name: Verify CLI help renders
        run: |
          uv run python cli.py --help
          uv run python cli.py review --help
          uv run python cli.py history --help
